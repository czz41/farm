version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: irrigation-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: irrigation
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  backend:
    build: ./backend
    container_name: irrigation-backend
    restart: always
    ports:
      - "7529:7529"
    depends_on:
      - mysql
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./backend/logs:/app/logs

  frontend:
    build: ./frontend
    container_name: irrigation-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      TZ: Asia/Shanghai